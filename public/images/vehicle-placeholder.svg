<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="car" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EB0A1E"/>
      <stop offset="100%" style="stop-color:#c41e3a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="200" cy="150" r="120" fill="#EB0A1E" opacity="0.08"/>
  <circle cx="1000" cy="600" r="180" fill="#4361ee" opacity="0.06"/>
  <!-- Stylized car silhouette -->
  <g transform="translate(300, 280)">
    <rect x="0" y="80" width="600" height="100" rx="20" fill="url(#car)" opacity="0.9"/>
    <path d="M120 80 L200 20 L480 20 L560 80 Z" fill="url(#car)"/>
    <circle cx="140" cy="200" r="50" fill="#111" stroke="#333" stroke-width="8"/>
    <circle cx="460" cy="200" r="50" fill="#111" stroke="#333" stroke-width="8"/>
    <circle cx="140" cy="200" r="20" fill="#444"/>
    <circle cx="460" cy="200" r="20" fill="#444"/>
  </g>
  <text x="600" y="520" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="28" font-weight="600" opacity="0.5">Elizade Connect</text>
</svg>
